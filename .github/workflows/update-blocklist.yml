name: Update Filtered Blocklist

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Allow manual runs

jobs:
  update-blocklist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch, filter, and write blocklist
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          curl -fsSL --max-time 60 "https://raw.githubusercontent.com/hagezi/dns-blocklists/refs/heads/main/domains/light.txt" > light.txt
          curl -fsSL -H "Authorization: Bearer $CF_API_TOKEN" "https://api.cloudflare.com/client/v4/radar/datasets/ranking_top_1000000" > top.txt
          comm -12 \
            <(grep -v '^[#$]' light.txt | tr '[:upper:]' '[:lower:]' | sort) \
            <(tail -n +2 top.txt | cut -d',' -f2 | tr '[:upper:]' '[:lower:]' | sort) \
            > public/blocklists/light.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/blocklists/light.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update filtered blocklist [skip ci]"
            git push origin master
          fi
